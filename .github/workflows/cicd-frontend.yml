name: CI/CD Frontend - Despacho Dashboard

# Se activa SOLO cuando hay push en la rama deploy
on:
  push:
    branches:
      - deploy

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── PASO 1: Descargar el código ──────────────────────
      - name: "1. Checkout del codigo"
        uses: actions/checkout@v4

      # ── PASO 2: Login a Docker Hub ───────────────────────
      - name: "2. Login a Docker Hub"
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── PASO 3: Construir imagen Docker ──────────────────
      - name: "3. Build de la imagen Docker"
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/frontend-despacho:latest .

      # ── PASO 4: Subir imagen a Docker Hub ────────────────
      - name: "4. Push imagen a Docker Hub"
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/frontend-despacho:latest

      # ── PASO 5: Configurar credenciales AWS ──────────────
      - name: "5. Configurar credenciales AWS"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ secrets.AWS_REGION }}

      # ── PASO 6: Desplegar en EC2-Web via SSM ─────────────
      - name: "6. Deploy en EC2-Web via SSM"
        run: |
          aws ssm send-command \
            --instance-ids ${{ secrets.EC2_FRONTEND_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "docker pull ${{ secrets.DOCKERHUB_USERNAME }}/frontend-despacho:latest",
              "docker stop frontend-despacho || true",
              "docker rm frontend-despacho || true",
              "docker run -d --name frontend-despacho --restart always -p 80:80 ${{ secrets.DOCKERHUB_USERNAME }}/frontend-despacho:latest"
            ]' \
            --region us-east-1