# ============================================================
# nginx.conf — Configuración del servidor nginx del frontend
# ITPCARGO™ - Innovatech Chile
#
# Este archivo define 3 bloques de servidor:
#   - Puerto 80:   Sirve el frontend React (archivos estáticos)
#   - Puerto 8080: Proxy inverso hacia el backend de ventas
#   - Puerto 8081: Proxy inverso hacia el backend de despachos
#
# MODIFICACIÓN EP3: Los bloques de proxy_pass fueron actualizados
# desde la IP estática 10.0.2.162 (instancia EC2 del EP2) hacia
# los nombres DNS internos del clúster Kubernetes en AWS EKS,
# permitiendo la comunicación interna entre pods sin exponer
# los backends directamente a internet.
# ============================================================


# ─────────────────────────────────────────────────────────────
# Bloque 1 — Frontend React (puerto 80)
# Sirve los archivos estáticos generados por Vite (build)
# y redirige todas las rutas al index.html para el enrutamiento
# del lado del cliente (SPA - Single Page Application)
# ─────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;  # Directorio donde se copian los archivos del build
    index index.html;

    location / {
        # Intenta servir el archivo o directorio solicitado;
        # si no existe, redirige al index.html (necesario para React Router)
        try_files $uri $uri/ /index.html;
    }
}


# ─────────────────────────────────────────────────────────────
# Bloque 2 — Proxy inverso hacia backend de ventas (puerto 8080)
# Recibe peticiones del frontend React en el puerto 8080
# y las redirige internamente al servicio backend-ventas-service
# usando el DNS interno del namespace innovatech en Kubernetes.
#
# MODIFICACIÓN EP3: proxy_pass actualizado de
#   http://10.0.2.162:8080  (IP EC2 del EP2 — ya no existe en EKS)
# a:
#   http://backend-ventas-service:8080  (DNS interno K8s)
# ─────────────────────────────────────────────────────────────
server {
    listen 8080;
    server_name _;

    location / {
        # Redirige el tráfico al servicio interno de Kubernetes
        # El DNS backend-ventas-service es resuelto automáticamente
        # por CoreDNS dentro del namespace innovatech del clúster EKS
        proxy_pass http://backend-ventas-service:8080;

        # Cabeceras para preservar la IP y host originales del cliente
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Headers CORS: permiten que el frontend React (origen distinto)
        # pueda hacer peticiones a este backend sin ser bloqueado por el navegador
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' '*' always;

        # Manejo del método preflight OPTIONS de CORS:
        # el navegador lo envía antes de cada petición real para verificar permisos
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' '*';
            add_header 'Content-Length' 0;
            add_header 'Content-Type' 'text/plain';
            return 204;  # Responde sin contenido para finalizar el preflight
        }
    }
}


# ─────────────────────────────────────────────────────────────
# Bloque 3 — Proxy inverso hacia backend de despachos (puerto 8081)
# Recibe peticiones del frontend React en el puerto 8081
# y las redirige internamente al servicio backend-despachos-service
# usando el DNS interno del namespace innovatech en Kubernetes.
#
# MODIFICACIÓN EP3: proxy_pass actualizado de
#   http://10.0.2.162:8081  (IP EC2 del EP2 — ya no existe en EKS)
# a:
#   http://backend-despachos-service:8081  (DNS interno K8s)
# ─────────────────────────────────────────────────────────────
server {
    listen 8081;
    server_name _;

    location / {
        # Redirige el tráfico al servicio interno de Kubernetes
        # El DNS backend-despachos-service es resuelto automáticamente
        # por CoreDNS dentro del namespace innovatech del clúster EKS
        proxy_pass http://backend-despachos-service:8081;

        # Cabeceras para preservar la IP y host originales del cliente
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Headers CORS: permiten que el frontend React (origen distinto)
        # pueda hacer peticiones a este backend sin ser bloqueado por el navegador
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' '*' always;

        # Manejo del método preflight OPTIONS de CORS:
        # el navegador lo envía antes de cada petición real para verificar permisos
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' '*';
            add_header 'Content-Length' 0;
            add_header 'Content-Type' 'text/plain';
            return 204;  # Responde sin contenido para finalizar el preflight
        }
    }
}
